name: Acceptance Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  merge_group:

jobs:
  server-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'
          cache-dependency-path: server/yarn.lock
      - name: Install Dependencies
        working-directory: server
        run: yarn install
      - name: Run Acceptance Tests
        working-directory: server
        run: |
          echo 'DATABASE_URL="file:./test.db"' > .env.test
          echo 'JWT_SECRET="test-secret"' >> .env.test
          echo 'SUPABASE_URL="http://localhost:54321"' >> .env.test
          echo 'SUPABASE_SERVICE_ROLE_KEY="test-key"' >> .env.test
          echo 'CLIENTID="test-client"' >> .env.test
          echo 'REFRESH_TOKEN="test-refresh"' >> .env.test
          yarn test src/__tests__/acceptance/

  client-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'
          cache-dependency-path: client/yarn.lock
      - name: Install Dependencies
        working-directory: client
        run: yarn install
      - name: Run Acceptance Tests
        working-directory: client
        run: yarn test src/__tests__/acceptance/
